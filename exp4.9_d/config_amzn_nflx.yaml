# Exp4.7 Configuration for AMZN and NFLX stocks

# Data configuration - using the full dataset
data:
  pickle_file: "data/finmem_data/stock_data_cherrypick_2000_2024.pkl"

# Experiment configuration
experiment:
  tickers:
    - AMZN  # E-commerce giant
    - NFLX  # Streaming service

  # Time periods for train/validation/test split
  train_period: ["2018-01-01", "2020-12-31"]  # 3 years training
  val_period: ["2021-01-01", "2022-12-31"]     # 2 years validation
  test_period: ["2023-01-01", "2023-12-31"]    # 1 year testing

  # LESR optimization parameters
  sample_count: 6      # Number of LLM samples per iteration
  max_iterations: 3    # Number of optimization iterations

# LLM configuration
llm:
  model: "gpt-4o-mini"  # OpenAI model to use
  temperature: 0.7     # Sampling temperature
  max_tokens: 2000     # Maximum tokens per response
  base_url: "https://api.chatanywhere.com.cn/v1"
  api_key: "sk-gtO2lC26gUwH8PeZpQVnf5HC5ZsI9ckTZBrtbafX0HdMaiwL"

# DQN training parameters
dqn:
  state_dim: 120       # Raw OHLCV dimension
  action_dim: 3        # Buy, Sell, Hold
  hidden_dim: 256      # Hidden layer size
  batch_size: 64       # Training batch size
  gamma: 0.99          # Discount factor
  tau: 0.005           # Target network update rate
  lr: 0.001            # Learning rate
  epsilon_start: 1.0   # Initial exploration rate
  epsilon_end: 0.1     # Final exploration rate
  epsilon_decay: 0.995 # Epsilon decay rate
  max_episodes: 50     # Training episodes per sample

# Intrinsic reward parameters
intrinsic:
  weight: 0.1         # Weight for intrinsic reward

# Backtest configuration
backtest:
  initial_cash: 100000  # Starting cash
  commission: 0.001     # Commission per share (0.1%)
  min_commission: 0.99  # Minimum commission

# Output configuration
output:
  output_dir: "exp4.7/results_amzn_nflx"
  log_dir: "logs"
  save_results: true
